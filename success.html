<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Возврат в приложение</title>
</head>
<body>
    <script>
        const params = new URLSearchParams(window.location.search);
        const invId = params.get('inv_id') || params.get('InvId');
        const outSum = params.get('OutSum');
        const signatureValue = params.get('SignatureValue');
        if (invId && outSum && signatureValue) {
            window.location.href = `robokassa://open?orderId=${invId}&OutSum=${outSum}&SignatureValue=${signatureValue}`;
        } else {
            document.write('Недостаточно параметров для возврата');
        }
    </script>
</body>
</html>
