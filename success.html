<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Возврат в приложение</title>
</head>
<body>
    <h3>Получены параметры:</h3>
    <pre id="params"></pre>
    <script>
        const params = new URLSearchParams(window.location.search);
        const invId = params.get('inv_id') || params.get('InvId');
        const outSum = params.get('OutSum');
        const signatureValue = params.get('SignatureValue');
        
        let output = '';
        for (let [key, value] of params.entries()) {
            output += `${key} = ${value}\n`;
        }
        document.getElementById('params').innerText = output || 'Параметры не найдены';
        
        if (invId && outSum && signatureValue) {
            document.body.innerHTML += '<p>✅ Параметры найдены. Перенаправление...</p>';
            setTimeout(() => {
                window.location.href = `robokassa://open?orderId=${invId}&OutSum=${outSum}&SignatureValue=${signatureValue}`;
            }, 1000);
        } else {
            document.body.innerHTML += '<p>❌ Недостаточно параметров для возврата</p>';
        }
    </script>
</body>
</html>
