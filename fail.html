<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Возврат в приложение</title>
    <script>
        // Получаем параметры из URL (orderId и OutSum)
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('orderId');
        const outSum = urlParams.get('OutSum');
        const signatureValue = urlParams.get('SignatureValue');

        // Формируем deep link с параметрами
        const deepLink = `robokassa://open?orderId=${orderId}&OutSum=${outSum}&SignatureValue=${signatureValue}`;
        
        // Перенаправляем
        window.location.href = deepLink;
    </script>
</head>
<body>
    <p>Перенаправление обратно в приложение...</p>
    <p>Если ничего не происходит, <a href="#" id="manualLink">нажмите здесь</a>.</p>
    <script>
        // Запасной вариант: показать ссылку, если редирект не сработал
        document.getElementById('manualLink').href = deepLink;
    </script>
</body>
</html>
